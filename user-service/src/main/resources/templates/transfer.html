<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Send Money</title>

<style>
body {
	font-family: Arial, sans-serif;
	background: #f5f7ff;
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
}

.container {
	width: 450px;
	background: white;
	padding: 30px;
	border-radius: 12px;
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
}

h2 {
	text-align: center;
	color: #1652f0;
	margin-bottom: 20px;
}

.form-group {
	margin-bottom: 15px;
}

label {
	display: block;
	margin-bottom: 5px;
	font-weight: bold;
}

input {
	width: 100%;
	padding: 10px;
	border: 1px solid #ccc;
	border-radius: 6px;
}

button {
	width: 100%;
	padding: 12px;
	background: #1652f0;
	color: white;
	border: none;
	border-radius: 6px;
	cursor: pointer;
}

button:hover {
	background: #0f46d8;
}
</style>
</head>

<body>

	<div class="container">

		<h2>Send Money</h2>

		<form th:action="@{/sendMoney}" th:object="${transaction}"
			method="post">



			<div class="form-group">
				<label>Receiver User Id</label> <input type="number"
					th:field="*{toUserId}" placeholder="Enter Receiver Id">
			</div>

			<div class="form-group">
				<label>Amount</label> <input type="number" step="0.01"
					th:field="*{amount}" placeholder="Enter Amount">
			</div>

			<div class="form-group">
				<label>Comment</label> <input type="text" th:field="*{comment}"
					placeholder="Optional Comment">
			</div>

			<button type="submit">Send Money</button>

		</form>

	</div>

</body>
</html>
