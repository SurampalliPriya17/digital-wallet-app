<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login - FintechWallet</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f6fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.login-container{
    width:450px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 35px rgba(0,0,0,0.08);
    position:relative;
    overflow:hidden;
}

.login-container::before{
    content:'';
    position:absolute;
    left:0;
    top:0;
    width:6px;
    height:100%;
    background:linear-gradient(to bottom,#8b5cf6,#2563eb);
}

.logo{
    text-align:center;
    font-size:55px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    color:#334155;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#64748b;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#475569;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

.btn{
    width:100%;
    border:none;
    padding:14px;
    background:#2563eb;
    color:white;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#1d4ed8;
}

.error{
    background:#fee2e2;
    color:#dc2626;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
    text-align:center;
}

.register-link{
    text-align:center;
    margin-top:20px;
    color:#64748b;
}

.register-link a{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}

</style>

</head>
<body>

<div class="login-container">

    <div class="logo">💳</div>

    <h1>Welcome Back</h1>

    <p class="subtitle">
        Enter your email to access your wallet
    </p>

    <form th:action="@{/login}"
          th:object="${loginRequest}"
          method="post">

        <div th:if="${error}" class="error">
            <span th:text="${error}"></span>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email"
                   th:field="*{email}"
                   placeholder="name@company.com"
                   required>
        </div>

        <button type="submit" class="btn">
            Continue
        </button>

    </form>

    <div class="register-link">
        New user?
        <a th:href="@{/register}">Create Account</a>
    </div>

</div>

</body>
</html>
