<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>User Registration</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#1652f0;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#1652f0;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0f46d8;
}


</style>
</head>

<body>

<div class="container">

    <h2>Create Wallet Account</h2>

    <!-- Thymeleaf Form -->
    <form th:action="@{/register}"
          th:object="${user}"
          method="post">

        <div class="form-group">
            <label>Name</label>
            <input type="text"
                   th:field="*{name}"
                   placeholder="Enter Name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email"
                   th:field="*{email}"
                   placeholder="Enter Email">
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text"
                   th:field="*{phone}"
                   placeholder="Enter Phone Number">
        </div>

        <div class="form-group">
            <label>KYC Number</label>
            <input type="text"
                   th:field="*{kycNumber}"
                   placeholder="Enter KYC Number">
        </div>

        <button type="submit">
            Register
        </button>

    </form>

   

</div>

</body>
</html>
