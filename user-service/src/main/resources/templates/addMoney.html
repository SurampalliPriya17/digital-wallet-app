<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Money</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f7ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#1652f0;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0f46d8;
}
</style>

</head>
<body>

<div class="container">

    <h2>Add Money</h2>

    <form th:action="@{/addMoney}"
          th:object="${wallet}"
          method="post">

        <div class="form-group">
            <label>Merchant ID</label>
            <input type="number"
                   th:field="*{merchantId}"
                   placeholder="Enter Merchant ID"
                   required>
        </div>

        <div class="form-group">
            <label>Amount</label>
            <input type="number"
                   step="0.01"
                   th:field="*{amount}"
                   placeholder="Enter Amount"
                   required>
        </div>

        <button type="submit">
            Proceed To Payment
        </button>

    </form>

</div>

</body>
</html>
