server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/userdb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.dbcp2.max-wait-millis=30000
spring.datasource.dbcp2.validation-query=/* ping */ select 1
spring.datasource.dbcp2.validation-query-timeout=30
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.show-sql=true


txn.init.topic=TXN-INIT
txn.completed.topic=TXN-COMPLETED
user.created.topic=USER-CREATED
wallet.updated.topic=WALLET-UPDATED
user.updated.topic=USER-UPDATED

kafka.bootstrapAddress=localhost:9092

initialize-payment-url=http://localhost:9090/pg-service/init-payment


