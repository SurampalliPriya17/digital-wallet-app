<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Wallet Update Failed</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f6fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:700px;
    background:white;
    border-radius:20px;
    padding:50px;
    text-align:center;
    box-shadow:0 10px 35px rgba(0,0,0,0.08);
    position:relative;
    overflow:hidden;
}

.container::before{
    content:'';
    position:absolute;
    left:0;
    top:0;
    width:8px;
    height:100%;
    background:linear-gradient(to bottom,#8b5cf6,#2563eb);
}

.container::after{
    content:'';
    position:absolute;
    right:0;
    top:0;
    width:8px;
    height:100%;
    background:linear-gradient(to bottom,#8b5cf6,#2563eb);
}

.logo{
    font-size:50px;
    margin-bottom:10px;
}

.header h1{
    color:#334155;
    margin-bottom:8px;
}

.header p{
    color:#64748b;
    margin-bottom:35px;
}

/* Failure Card */
.failure-card{
    background:linear-gradient(135deg,#dc2626,#ef4444);
    color:white;
    padding:35px;
    border-radius:18px;
    margin-bottom:35px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.failure-card .icon{
    font-size:70px;
    margin-bottom:15px;
}

.failure-card h2{
    margin-bottom:10px;
}

.failure-card p{
    opacity:0.95;
    line-height:1.6;
}

.btn{
    display:inline-block;
    text-decoration:none;
    background:#2563eb;
    color:white;
    padding:12px 30px;
    border-radius:10px;
    font-weight:600;
    transition:0.3s;
}

.btn:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

</style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="logo">💳</div>
        <h1>FintechWallet</h1>
        <p>Secure your financial future in minutes.</p>
    </div>

    <div class="failure-card">

        <div class="icon">❌</div>

        <h2>Wallet Update Failed</h2>

        <p>
            We were unable to update your wallet balance.
            Please verify the entered details and try again.
        </p>

    </div>

   <a href="http://localhost:8080/home" class="btn">
    Go To Dashboard
</a>

</div>

</body>
</html>
